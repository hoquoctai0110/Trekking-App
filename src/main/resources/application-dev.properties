spring.application.name=Trekking-App

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}

app.google.client-id=${APP_GOOGLE_CLIENT_ID:test-client-id}
app.google.client-ids=${APP_GOOGLE_CLIENT_IDS:}
app.google.mock-enabled=${APP_GOOGLE_MOCK_ENABLED:false}
app.jwt.secret=${APP_JWT_SECRET:change-me-in-dev}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
mapbox.access-token=${MAPBOX_ACCESS_TOKEN:}
payos.client-id=${PAYOS_CLIENT_ID:}
payos.api-key=${PAYOS_API_KEY:}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:}
payos.return-url=${PAYOS_RETURN_URL:}
payos.cancel-url=${PAYOS_CANCEL_URL:}
