spring.application.name=Trekking-App
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=update
spring.servlet.multipart.max-file-size=${APP_MEDIA_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${APP_MEDIA_MAX_REQUEST_SIZE:50MB}

app.mail.from=${MAIL_FROM:}
resend.api-key=${RESEND_API_KEY:}

app.google.client-id=${APP_GOOGLE_CLIENT_ID:}
app.google.client-ids=${APP_GOOGLE_CLIENT_IDS:}
app.google.mock-enabled=${APP_GOOGLE_MOCK_ENABLED:false}
app.jwt.secret=${APP_JWT_SECRET:chektrek-production-jwt-secret-key-2026-very-long}}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
mapbox.access-token=${MAPBOX_ACCESS_TOKEN:}
payos.client-id=${PAYOS_CLIENT_ID}
payos.api-key=${PAYOS_API_KEY}
payos.checksum-key=${PAYOS_CHECKSUM_KEY}
payos.return-url=${PAYOS_RETURN_URL}
payos.cancel-url=${PAYOS_CANCEL_URL}

app.media.max-file-size-bytes=${APP_MEDIA_MAX_FILE_SIZE_BYTES:10485760}
app.media.allowed-content-types=${APP_MEDIA_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp}
app.media.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.media.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.media.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
